<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheckFlow - Admin</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<div id="toastContainer" class="toast-container"></div>

<body>
  <div class="page">
    <div class="card admin-card">

      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="history-header">
        <div class="subtitle no-margin">Painel Admin</div>
        <p class="history-description">
          Cadastre, visualize, edite e exclua tarefas complementares do sistema.
        </p>
      </div>

      <div class="admin-layout">

        <section class="admin-form-card">
          <h3 class="selection-title">Nova tarefa</h3>

          <label for="processo" class="admin-label">Processo</label>
          <select id="processo" class="input">
            <option value="">Selecione</option>
            <option value="Apuração">Apuração</option>
            <option value="SPED">SPED</option>
            <option value="SCANC">SCANC</option>
          </select>

          <label for="estado" class="admin-label">Estado</label>
          <select id="estado" class="input">
            <option value="">Selecione</option>
          </select>

          <label for="filial" class="admin-label">Filial</label>
          <select id="filial" class="input">
            <option value="">Sem filial específica</option>
          </select>

          <label for="titulo" class="admin-label">Título da tarefa</label>
          <input
            id="titulo"
            class="input"
            type="text"
            placeholder="Ex.: Validar obrigação estadual"
          >

          <label for="instrucao" class="admin-label">Instruções</label>
          <textarea
            id="instrucao"
            class="input admin-textarea"
            placeholder="Digite uma instrução por linha"
          ></textarea>

          <div class="admin-actions">
            <button
              id="botaoSalvarTarefa"
              class="button"
              type="button"
              onclick="salvarTarefa()"
            >
              Salvar tarefa
            </button>

            <button
              class="secondary-button small-button"
              type="button"
              onclick="limparFormularioAdmin()"
            >
              Cancelar edição
            </button>
          </div>
        </section>

        <section class="admin-list-card">
          <div class="admin-list-header">
            <h3 class="selection-title">Tarefas cadastradas</h3>

            <button
              class="secondary-button small-button"
              type="button"
              onclick="carregarTarefasAdminTela()"
            >
              Atualizar
            </button>
          </div>

          <div class="admin-filters">
            <select id="filtroProcesso" class="input">
              <option value="">Todos os processos</option>
              <option value="Apuração">Apuração</option>
              <option value="SPED">SPED</option>
              <option value="SCANC">SCANC</option>
            </select>

            <select id="filtroEstado" class="input">
              <option value="">Todos os estados</option>
            </select>

            <input
              id="filtroFilial"
              class="input"
              type="text"
              placeholder="Filtrar por filial"
            >

            <input
              id="filtroTexto"
              class="input"
              type="text"
              placeholder="Buscar por título"
            >
          </div>

          <div id="listaTarefasAdmin" class="history-list">
            <div class="empty-history">
              <div class="empty-history-icon">📋</div>
              <h3>Carregando tarefas...</h3>
              <p>Aguarde enquanto buscamos os dados.</p>
            </div>
          </div>
        </section>

      </div>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/admin.js"></script>
</body>
</html>
