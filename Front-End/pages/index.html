<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckFlow - Login</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
  <div id="toastContainer" class="toast-container"></div>

  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="subtitle">Acesso ao sistema</div>

      <input class="input" type="text" id="usuario" placeholder="Usuário Corporativo">
      <input class="input" type="password" id="senha" placeholder="Senha">

      <button class="button" type="button" onclick="fazerLogin()">
        Entrar
      </button>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/auth.js"></script>
</body>
</html>
