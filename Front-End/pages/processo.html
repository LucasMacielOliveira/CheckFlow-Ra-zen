<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckFlow - Processo</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<div id="toastContainer" class="toast-container"></div>

<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="subtitle">Selecione um processo</div>

      <div class="button-row">
        <button class="secondary-button" onclick="selecionarProcesso('Apuração')">Apuração</button>
        <button class="secondary-button" onclick="selecionarProcesso('SPED')">SPED</button>
        <button class="secondary-button" onclick="selecionarProcesso('SCANC')">SCANC</button>
        <button class="history-nav-button" onclick="irParaHistorico()">Ver histórico</button>

        <button
          id="botaoAdmin"
          class="secondary-button"
          style="display: none;"
          onclick="irParaAdmin()"
        >
          Painel Admin
        </button>
      </div>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/processos.js"></script>
  <script>
    function selecionarProcesso(processo) {
      if (!exigirLogin() || !exigirArea()) {
        return;
      }

      limparFluxo();
      salvarTexto("processoSelecionado", processo);

      const config = processosConfig[processo];

      if (!config) {
        alert("Processo inválido.");
        return;
      }

      window.location.href = "filtros.html";
    }

    function irParaHistorico() {
      if (!exigirLogin() || !exigirArea()) {
        return;
      }

      window.location.href = "historico.html";
    }

    function irParaAdmin() {
      if (!exigirLogin() || !exigirArea() || !exigirAdmin()) {
        return;
      }

      window.location.href = "admin.html";
    }

    function mostrarBotaoAdminSeNecessario() {
      const perfil = localStorage.getItem("perfilUsuario");
      const botaoAdmin = document.getElementById("botaoAdmin");

      if (perfil === "admin") {
        botaoAdmin.style.display = "block";
      } else {
        botaoAdmin.style.display = "none";
      }
    }

    if (exigirLogin() && exigirArea()) {
      mostrarBotaoAdminSeNecessario();
    }
  </script>
</body>
</html>
