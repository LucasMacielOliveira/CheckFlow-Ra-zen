<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckFlow - Checklist</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="subtitle">Checklist do Processo</div>

      <div class="info-text" id="infoResumo"></div>

      <div id="loadingChecklist" class="loading-state" style="display: none;">
        <div class="loading-spinner"></div>
        <span>Carregando checklist...</span>
      </div>

      <div class="progress-wrapper" id="progressWrapper" style="display: none;">
        <div class="progress-header">
          <span>Progresso do checklist</span>
          <span id="progressText">0%</span>
        </div>

        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <div id="progressoChecklist" class="progress-status">
          0 de 0 tarefas concluídas
        </div>
      </div>

      <div class="checklist-box" id="checklistContainer"></div>

      <div class="button-row actions-inline">
        <button class="button" id="btnFinalizarChecklist" type="button" onclick="validarChecklist()">
          Finalizar Checklist
        </button>
        <button class="history-nav-button" type="button" onclick="irParaHistorico()">
          Ver histórico
        </button>
      </div>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>Atenção</h3>
      <p>É necessário dar check em todas as atividades.</p>
      <div class="modal-actions">
        <button type="button" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <div id="modalSucesso" class="modal" style="display: none;">
    <div class="modal-content sucesso">
      <div class="success-animation">
        <div class="success-circle">
          <div class="success-check"></div>
        </div>
      </div>

      <h3>Sucesso</h3>
      <p>Checklist finalizado com sucesso!</p>

      <div class="modal-actions">
        <button type="button" onclick="fecharModalSucesso()">OK</button>
        <button
          class="history-nav-button modal-history-button"
          type="button"
          onclick="irParaHistorico()"
        >
          Ir para histórico
        </button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/checklist.js"></script>

  <script>
    
  </script>
</body>
</html>
