<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckFlow - Histórico</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<div id="toastContainer" class="toast-container"></div>

<body>
  <div class="page">
    <div class="card card-history">
      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="history-header">
        <div class="subtitle no-margin">Histórico de Checklists</div>
        <p class="history-description">
          Consulte os checklists finalizados e remova registros quando necessário.
        </p>
      </div>

      <div class="history-actions">
        <button class="secondary-button small-button" type="button" onclick="voltarChecklist()">
          Voltar
        </button>
        <button
          id="btnLimparHistorico"
          class="danger-outline-button small-button"
          type="button"
        >
          Limpar histórico
        </button>
      </div>

     <div id="loadingHistorico" class="loading-state" style="display: none;">
        <div class="loading-spinner"></div>
        <span>Carregando histórico...</span>
      </div>

      <div id="historyList" class="history-list"></div>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <div id="modalConfirmacao" class="modal">
    <div class="modal-content">
      <h3>Confirmar exclusão</h3>
      <p id="textoConfirmacao">Deseja realmente excluir este registro?</p>
      <div class="modal-actions">
        <button id="btnCancelarExclusao" type="button">Cancelar</button>
        <button id="btnConfirmarExclusao" class="danger-button" type="button">
          Excluir
        </button>
      </div>
    </div>
  </div>

  <div id="modalDetalhes" class="modal">
    <div class="modal-content">
      <h3>Detalhes do Checklist</h3>
      <div id="conteudoDetalhes"></div>
      <button id="btnFecharDetalhes" type="button">Fechar</button>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/historico.js"></script>
</body>
</html>
