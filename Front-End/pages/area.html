<!DOCTYPE html>
<html>
<head>
  <title>CheckFlow - Áreas</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div id="toastContainer" class="toast-container"></div>

  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/checkflow-logo.png" alt="CheckFlow">
      </div>

      <div class="subtitle">Selecione a área</div>

      <div class="button-row">
        <button class="area-button" onclick="entrarMobilidade()">
          <i class="fa-solid fa-truck"></i>
          Mobilidade
        </button>
      </div>

      <div class="footer-brand">
        <img src="../assets/raizen-logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
  if (!exigirLogin()) return;

  iniciarPagina();
});
    
    
    function entrarMobilidade() {
      if (!exigirLogin()) {
        return;
      }

      limparFluxo();
      salvarTexto("areaSelecionada", "Mobilidade");

      console.log("Área salva:", localStorage.getItem("areaSelecionada"));

      window.location.href = "processo.html";
    }

    exigirLogin();
  </script>
</body>
</html>
