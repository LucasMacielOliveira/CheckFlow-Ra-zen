<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CheckFlow - Seleção</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/CheckFlowLogo.png" alt="CheckFlow">
      </div>

      <div class="subtitle">Selecione os parâmetros</div>

      <div class="subtitle">Competência</div>
      <input class="input" type="month" id="competencia">

      <div class="selection-grid" id="selectionGrid">
        <div class="selection-card" id="blocoEstados">
          <div class="selection-title">Selecionar Estado</div>

          <div class="multi-select-box">
            <input
              type="text"
              id="searchEstados"
              class="search-input"
              placeholder="Pesquisar estado..."
              onkeyup="filtrarOpcoes('searchEstados', 'opcao-estado')"
            >
            <div class="options-box" id="listaEstados"></div>
          </div>

          <div class="selected-preview" id="previewEstados">
            Nenhum item selecionado.
          </div>
        </div>

        <div class="selection-card" id="blocoFiliais">
          <div class="selection-title">Selecionar Filial</div>

          <div class="multi-select-box">
            <input
              type="text"
              id="searchFiliais"
              class="search-input"
              placeholder="Pesquisar filial..."
              onkeyup="filtrarOpcoes('searchFiliais', 'opcao-filial')"
            >
            <div class="options-box" id="listaFiliais"></div>
          </div>

          <div class="selected-preview" id="previewFiliais">
            Nenhum item selecionado.
          </div>
        </div>
      </div>

      <button class="button button-fixed" onclick="continuar()">Continuar</button>

      <div class="footer-brand">
        <img src="../assets/logo.png" alt="Raízen">
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/processos.js"></script>
  <script src="../js/filtros.js"></script>
  <script src="../js/api.js"></script>

  <script>
    function limparSelecaoFiliais() {
      document.getElementById("listaFiliais").innerHTML = "";
      document.getElementById("previewFiliais").innerHTML = "Nenhum item selecionado.";

      const campoBuscaFilial = document.getElementById("searchFiliais");
      if (campoBuscaFilial) {
        campoBuscaFilial.value = "";
      }

      salvarLista("filiaisSelecionadas", []);
    }

    function mostrarOuOcultarFilial() {
  const processo = lerTexto("processoSelecionado");
  const config = processosConfig[processo];
  const blocoFiliais = document.getElementById("blocoFiliais");
  const grid = document.getElementById("selectionGrid");

  console.log("Processo salvo:", processo);
  console.log("Config encontrada:", config);

  if (config && config.usaFilial) {
    blocoFiliais.classList.remove("hidden");
    grid.classList.remove("single-column");
  } else {
    blocoFiliais.classList.add("hidden");
    grid.classList.add("single-column");
    limparSelecaoFiliais();
  }
}

    async function carregarEstados() {
      try {
        const estados = await buscarEstados();

        renderizarOpcoes(
          "listaEstados",
          estados,
          "estado-checkbox",
          "opcao-estado",
          "previewEstados",
          "Estados selecionados",
          "selecionarTodosEstados"
        );

        restaurarEstadosSalvos();
        atualizarPreview(
          "estado-checkbox",
          "previewEstados",
          "Estados selecionados",
          "selecionarTodosEstados"
        );

        await carregarFiliaisSeNecessario();
      } catch (erro) {
        alert("Não foi possível carregar os estados.");
        console.error(erro);
      }
    }

    function restaurarEstadosSalvos() {
      const estadosSalvos = lerLista("estadosSelecionados");

      if (!estadosSalvos.length) {
        return;
      }

      const checkboxes = document.querySelectorAll(".estado-checkbox");

      checkboxes.forEach(function (checkbox) {
        checkbox.checked = estadosSalvos.includes(checkbox.value);
      });
    }

    function restaurarFiliaisSalvas() {
      const filiaisSalvas = lerLista("filiaisSelecionadas");

      if (!filiaisSalvas.length) {
        return;
      }

      const checkboxes = document.querySelectorAll(".filial-checkbox");

      checkboxes.forEach(function (checkbox) {
        checkbox.checked = filiaisSalvas.includes(checkbox.value);
      });
    }

    async function carregarFiliaisSeNecessario() {
      const processo = lerTexto("processoSelecionado");
      const config = processosConfig[processo];

      if (!config || !config.usaFilial) {
        return;
      }

      const estadosSelecionados = obterSelecionados("estado-checkbox");

      if (estadosSelecionados.length === 0) {
        limparSelecaoFiliais();
        return;
      }

      try {
        let filiais = [];

        for (const estado of estadosSelecionados) {
          const filiaisDoEstado = await buscarFiliaisPorEstado(estado);

          filiaisDoEstado.forEach(function (filial) {
            if (!filiais.includes(filial)) {
              filiais.push(filial);
            }
          });
        }

        filiais.sort();

        renderizarOpcoes(
          "listaFiliais",
          filiais,
          "filial-checkbox",
          "opcao-filial",
          "previewFiliais",
          "Filiais selecionadas",
          "selecionarTodosFiliais"
        );

        restaurarFiliaisSalvas();
        atualizarPreview(
          "filial-checkbox",
          "previewFiliais",
          "Filiais selecionadas",
          "selecionarTodosFiliais"
        );
      } catch (erro) {
        alert("Não foi possível carregar as filiais.");
        console.error(erro);
      }
    }

    async function aoAlterarEstados() {
      const estadosSelecionados = obterSelecionados("estado-checkbox");
      salvarLista("estadosSelecionados", estadosSelecionados);
      salvarLista("filiaisSelecionadas", []);
      await carregarFiliaisSeNecessario();
    }

    function ativarEventoEstados() {
      document.addEventListener("change", async function (event) {
        if (event.target.classList.contains("estado-checkbox")) {
          atualizarPreview(
            "estado-checkbox",
            "previewEstados",
            "Estados selecionados",
            "selecionarTodosEstados"
          );
          await aoAlterarEstados();
        }

        if (event.target.id === "selecionarTodosEstados") {
          setTimeout(async function () {
            const estadosSelecionados = obterSelecionados("estado-checkbox");
            salvarLista("estadosSelecionados", estadosSelecionados);
            salvarLista("filiaisSelecionadas", []);
            await carregarFiliaisSeNecessario();
          }, 0);
        }

        if (event.target.classList.contains("filial-checkbox")) {
          atualizarPreview(
            "filial-checkbox",
            "previewFiliais",
            "Filiais selecionadas",
            "selecionarTodosFiliais"
          );

          const filiaisSelecionadas = obterSelecionados("filial-checkbox");
          salvarLista("filiaisSelecionadas", filiaisSelecionadas);
        }

        if (event.target.id === "selecionarTodosFiliais") {
          setTimeout(function () {
            atualizarPreview(
              "filial-checkbox",
              "previewFiliais",
              "Filiais selecionadas",
              "selecionarTodosFiliais"
            );

            const filiaisSelecionadas = obterSelecionados("filial-checkbox");
            salvarLista("filiaisSelecionadas", filiaisSelecionadas);
          }, 0);
        }
      });
    }

    function carregarCompetenciaSalva() {
      const competenciaSalva = lerTexto("competenciaSelecionada");

      if (competenciaSalva) {
        document.getElementById("competencia").value = competenciaSalva;
      }
    }

    function continuar() {
      const processo = lerTexto("processoSelecionado");
      const config = processosConfig[processo];
      const estados = obterSelecionados("estado-checkbox");
      const competencia = document.getElementById("competencia").value;

      if (estados.length === 0) {
        alert("Selecione pelo menos um estado.");
        return;
      }

      if (!competencia) {
        alert("Selecione a competência.");
        return;
      }

      salvarLista("estadosSelecionados", estados);
      salvarTexto("competenciaSelecionada", competencia);

      if (config && config.usaFilial) {
        const filiais = obterSelecionados("filial-checkbox");

        if (filiais.length === 0) {
          alert("Selecione pelo menos uma filial.");
          return;
        }

        salvarLista("filiaisSelecionadas", filiais);
      } else {
        salvarLista("filiaisSelecionadas", []);
      }

      window.location.href = "checklist.html";
    }

    if (exigirLogin() && exigirArea() && exigirProcesso()) {
      mostrarOuOcultarFilial();
      carregarCompetenciaSalva();
      ativarEventoEstados();
      carregarEstados();
    }
  </script>
</body>
</html>
