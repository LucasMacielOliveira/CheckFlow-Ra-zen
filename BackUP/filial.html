<!DOCTYPE html>
<html>
<head>
  <title>CheckFlow - Filiais</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <img src="../assets/CheckFlowLogo.png" alt="CheckFlow">
      </div>
      <div class="subtitle">Selecione as Filiais</div>
      <div class="subtitle">Competência</div>

      <input class="input" type="month" id="competencia">

      <div class="multi-select-box">
        <input
          type="text"
          id="searchFiliais"
          class="search-input"
          placeholder="Pesquisar filial..."
          onkeyup="filtrarOpcoes('searchFiliais', 'opcao-filial')"
        >

        <div class="options-box" id="listaFiliais"></div>
      </div>

      <div class="selected-preview" id="previewFiliais">
        Nenhum item selecionado.
      </div>

      <button class="button button-fixed" onclick="continuar()">Continuar</button>

       <div class="footer-brand">
  <img src="../assets/logo.png" alt="Raízen">
</div>
    </div>
  </div>

  <script src="../JS/storage.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/locais.js"></script>
  <script src="../JS/filtros.js"></script>
  <script>
    function carregarFiliais() {
      const estadosSelecionados = lerLista("estadosSelecionados");

      if (estadosSelecionados.length === 0) {
        alert("Selecione os estados antes de escolher as filiais.");
        window.location.href = "estado.html";
        return;
      }

      const filiais = obterFiliaisPorEstados(estadosSelecionados);

      renderizarOpcoes(
        "listaFiliais",
        filiais,
        "filial-checkbox",
        "opcao-filial",
        "previewFiliais",
        "Filiais selecionadas",
        "selecionarTodosFiliais"
      );
    }

    function continuar() {
      const filiais = obterSelecionados("filial-checkbox");
      let competencia = document.getElementById("competencia").value;

      if (filiais.length === 0) {
        alert("Selecione pelo menos uma filial.");
        return;
      }

      if (!competencia) {
        competencia = lerTexto("competenciaSelecionada");
      }

      if (!competencia) {
        alert("Selecione a competência.");
        return;
      }

      salvarLista("filiaisSelecionadas", filiais);
      salvarTexto("competenciaSelecionada", competencia);

      window.location.href = "checklist.html";
    }

    if (exigirLogin() && exigirArea() && exigirProcesso()) {
      const competenciaSalva = lerTexto("competenciaSelecionada");
      if (competenciaSalva) {
        document.getElementById("competencia").value = competenciaSalva;
      }

      carregarFiliais();
    }
  </script>
</body>
</html>
