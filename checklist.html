  <!DOCTYPE html>
  <html>
  <head>
  <title>CheckFlow - Checklist</title>
  <link rel="stylesheet" href="style.css">
  </head>
  <body>
  <div class="page">
  <div class="card">
  <div class="logo">CheckFlow</div>
  <div class="subtitle">Checklist</div>
  <div class="info-text"><strong>Processo:</strong> <span id="processoTexto">-</span></div>
  <div class="info-text"><strong id="labelLocal">Filial:</strong> <span id="valorLocal">-</span></div>
  <div class="info-text"><strong>Analista:</strong> <span id="analistaTexto">-</span></div>
  <div class="info-text"><strong>Competência:</strong> <span id="competenciaTexto">-</span></div>
  <div class="checklist-box" id="checklistBox"></div>
  <button class="button button-fixed" onclick="validarChecklist()">Salvar</button>
  <div class="footer-brand">raizen</div>
  </div>
  </div>
  <div id="modal" class="modal">
  <div class="modal-content">
  <h3>Atenção</h3>
  <p>É necessário dar check em todas as atividades.</p>
  <button onclick="fecharModal()">Fechar</button>
  </div>
  </div>
  <div id="modalSucesso" class="modal">
  <div class="modal-content sucesso">
  <h3>Sucesso</h3>
  <p>Checklist salvo com sucesso!</p>
  <button onclick="fecharModalSucesso()">OK</button>
  </div>
  </div>
  <script>
    const tarefasPorProcesso = {
      "Apuração": [
        {
          titulo: "Conferir notas fiscais",
          instrucao: [
            "Acesse o sistema fiscal.",
            "Filtre pela competência do mês.",
            "Compare com o relatório interno.",
            "Verifique divergências antes de concluir."
          ]
        },
        {
          titulo: "Validar relatórios",
          instrucao: [
            "Abra o relatório mensal.",
            "Revise os valores principais.",
            "Compare com os dados lançados no sistema."
          ]
        },
        {
          titulo: "Conferir estoque",
          instrucao: [
            "Consulte o estoque físico.",
            "Compare com o estoque registrado no sistema.",
            "Anote qualquer inconsistência encontrada."
          ]
        },
        {
          titulo: "Revisar movimentações",
          instrucao: [
            "Verifique as entradas e saídas do período.",
            "Confira se os lançamentos estão corretos.",
            "Ajuste ou sinalize divergências."
          ]
        }
      ],
      "SPED": [
        {
          titulo: "Gerar arquivo SPED",
          instrucao: [
            "Acesse o módulo do SPED.",
            "Selecione a competência correta.",
            "Gere o arquivo para validação."
          ]
        },
        {
          titulo: "Validar no PVA",
          instrucao: [
            "Abra o programa validador.",
            "Importe o arquivo gerado.",
            "Analise os erros e avisos."
          ]
        },
        {
          titulo: "Corrigir inconsistências",
          instrucao: [
            "Volte ao sistema.",
            "Ajuste os lançamentos incorretos.",
            "Gere o arquivo novamente, se necessário."
          ]
        },
        {
          titulo: "Transmitir arquivo",
          instrucao: [
            "Confirme que não há erros impeditivos.",
            "Realize a transmissão.",
            "Guarde o recibo."
          ]
        }
      ],
      "SCANC": [
        {
          titulo: "Validar arquivo SCANC",
          instrucao: [
            "Acesse o sistema SCANC.",
            "Selecione a competência.",
            "Valide os dados do arquivo."
          ]
        },
        {
          titulo: "Conferir movimentações",
          instrucao: [
            "Revise entradas e saídas do período.",
            "Compare com os controles internos.",
            "Anote divergências."
          ]
        },
        {
          titulo: "Transmitir SCANC",
          instrucao: [
            "Confirme os dados.",
            "Realize a transmissão no sistema.",
            "Verifique a confirmação."
          ]
        },
        {
          titulo: "Salvar comprovante",
          instrucao: [
            "Baixe o comprovante de envio.",
            "Salve em local apropriado.",
            "Confirme o nome do arquivo."
          ]
        }
      ]
    };
    function toggleInstruction(id) {
      const box = document.getElementById(id);
      if (box.style.display === "block") {
        box.style.display = "none";
      } else {
        box.style.display = "block";
      }
    }
    function validarChecklist() {
      const checkboxes = document.querySelectorAll(".task-checkbox");
      let todosMarcados = true;
      checkboxes.forEach(function(checkbox) {
        if (!checkbox.checked) {
          todosMarcados = false;
        }
      });
      if (!todosMarcados) {
        document.getElementById("modal").style.display = "flex";
        return;
      }
      document.getElementById("modalSucesso").style.display = "flex";
    }
    function fecharModal() {
      document.getElementById("modal").style.display = "none";
    }
    function fecharModalSucesso() {
      document.getElementById("modalSucesso").style.display = "none";
    }
    function formatarCompetencia(valor) {
      if (!valor || !valor.includes("-")) {
        return "-";
      }
      const [ano, mes] = valor.split("-");
      const meses = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
      ];
      return meses[parseInt(mes, 10) - 1] + " " + ano;
    }
    function carregarCompetencia() {
      const valor = localStorage.getItem("competenciaSelecionada");
      document.getElementById("competenciaTexto").textContent = formatarCompetencia(valor);
    }
    function carregarResumo() {
      const processo = localStorage.getItem("processoSelecionado");
      const estados = JSON.parse(localStorage.getItem("estadosSelecionados")) || [];
      const filiais = JSON.parse(localStorage.getItem("filiaisSelecionadas")) || [];
      const labelLocal = document.getElementById("labelLocal");
      const valorLocal = document.getElementById("valorLocal");
      const processoTexto = document.getElementById("processoTexto");
      processoTexto.textContent = processo || "-";
      if (processo === "SPED") {
        labelLocal.textContent = "Estados:";
        valorLocal.textContent = estados.length > 0 ? estados.join(", ") : "-";
      } else {
        labelLocal.textContent = "Filiais:";
        valorLocal.textContent = filiais.length > 0 ? filiais.join(", ") : "-";
      }
    }
    function carregarUsuario() {
      const usuario = localStorage.getItem("usuarioLogado");
      if (usuario && usuario.trim() !== "") {
        document.getElementById("analistaTexto").textContent = usuario.trim();
      } else {
        document.getElementById("analistaTexto").textContent = "-";
      }
    }
    function renderizarChecklist() {
      const processo = localStorage.getItem("processoSelecionado");
      const checklistBox = document.getElementById("checklistBox");
      const tarefas = tarefasPorProcesso[processo] || [];
      checklistBox.innerHTML = "";
      tarefas.forEach((tarefa, index) => {
        const instructionId = "instrucao" + index;
        const passosHtml = tarefa.instrucao
          .map((passo, i) => `${i + 1}. ${passo}`)
          .join("<br>");
        const taskHtml = `
  <div class="task">
  <div class="task-top">
  <div class="task-left">
  <input type="checkbox" class="task-checkbox">
  <span class="task-title">${tarefa.titulo}</span>
  </div>
  <button class="instruction-button" onclick="toggleInstruction('${instructionId}')">
                Ver instrução
  </button>
  </div>
  <div class="instruction-box" id="${instructionId}">
              ${passosHtml}
  </div>
  </div>
        `;
        checklistBox.innerHTML += taskHtml;
      });
    }
    carregarResumo();
    carregarUsuario();
    carregarCompetencia();
    renderizarChecklist();
  </script>
  </body>
  </html>
