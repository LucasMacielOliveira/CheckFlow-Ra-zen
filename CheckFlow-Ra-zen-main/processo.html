<!DOCTYPE html>
<html>
<head>
  <title>CheckFlow - Processo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">CheckFlow</div>
      <div class="subtitle">Selecione um processo</div>

      <div class="button-row">
        <button class="secondary-button" onclick="selecionarProcesso('Apuração')">Apuração</button>
        <button class="secondary-button" onclick="selecionarProcesso('SPED')">SPED</button>
        <button class="secondary-button" onclick="selecionarProcesso('SCANC')">SCANC</button>
      </div>

      <div class="footer-brand">raizen</div>
    </div>
  </div>

 <script>
  function verificarAcessoProcesso() {
    const usuario = localStorage.getItem("usuarioLogado");
    const area = localStorage.getItem("areaSelecionada");

    if (!usuario || usuario.trim() === "") {
      alert("Você precisa fazer login para acessar esta página.");
      window.location.href = "index.html";
      return false;
    }

    if (!area || area.trim() === "") {
      alert("Selecione uma área antes de escolher o processo.");
      window.location.href = "area.html";
      return false;
    }

    return true;
  }

  function limparEtapasSeguintes() {
    localStorage.removeItem("estadosSelecionados");
    localStorage.removeItem("filiaisSelecionadas");
    localStorage.removeItem("competenciaSelecionada");
  }

  function selecionarProcesso(processo) {
    const acessoPermitido = verificarAcessoProcesso();

    if (!acessoPermitido) {
      return;
    }

    limparEtapasSeguintes();
    localStorage.setItem("processoSelecionado", processo);
    window.location.href = "estado.html";
  }

  verificarAcessoProcesso();
</script>
</script>
</body>
</html>
